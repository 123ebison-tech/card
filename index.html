<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex Chen · Creative Director</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(120,80,255,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(0,200,180,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 420px;
      padding: 48px 44px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 28px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(120,80,255,0.15),
        0 30px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.08);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .avatar-wrap {
      position: relative;
      width: 72px;
      height: 72px;
      margin-bottom: 24px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7850ff, #00c8b4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
    }

    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: linear-gradient(135deg, #7850ff, #00c8b4) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #00c8b4;
      background: rgba(0,200,180,0.1);
      border: 1px solid rgba(0,200,180,0.2);
      border-radius: 20px;
      padding: 3px 10px;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00c8b4;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .name {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .name span {
      background: linear-gradient(90deg, #7850ff, #00c8b4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      font-weight: 400;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .company {
      font-size: 13px;
      color: rgba(255,255,255,0.25);
      margin-bottom: 32px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(120,80,255,0.3), rgba(0,200,180,0.3), transparent);
      margin-bottom: 28px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: rgba(255,255,255,0.6);
      font-size: 13.5px;
      transition: color 0.2s;
    }

    .link-item:hover { color: #fff; }

    .link-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    .link-item:hover .link-icon {
      background: rgba(120,80,255,0.15);
      border-color: rgba(120,80,255,0.3);
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .tag {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      padding: 3px 9px;
      letter-spacing: 0.03em;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="bg-glow"></div>

  <div class="card">
    <div class="avatar-wrap">
      <div class="avatar">AC</div>
      <div class="avatar-ring"></div>
    </div>

    <div class="status">Available for work</div>

    <div class="name">Alex <span>Chen</span></div>
    <div class="title">Creative Director & Digital Artist</div>
    <div class="company">✦ Studio Nebula · Shanghai</div>

    <div class="divider"></div>

    <div class="links">
      <a class="link-item" href="mailto:alex@studionebula.design">
        <div class="link-icon">✉️</div>
        alex@studionebula.design
      </a>
      <a class="link-item" href="tel:+8613800138000">
        <div class="link-icon">📱</div>
        +86 138 0013 8000
      </a>
      <a class="link-item" href="https://studionebula.design" target="_blank">
        <div class="link-icon">🌐</div>
        studionebula.design
      </a>
      <a class="link-item" href="https://behance.net/alexchen" target="_blank">
        <div class="link-icon">🎨</div>
        behance.net/alexchen
      </a>
    </div>

    <div class="tag-row">
      <span class="tag">Branding</span>
      <span class="tag">Motion</span>
      <span class="tag">UI/UX</span>
      <span class="tag">3D</span>
      <span class="tag">Creative Strategy</span>
    </div>
  </div>
</body>
</html>
