<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alex Chen</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,0.035);
      --border: rgba(255,255,255,0.09);
      --accent: #7850ff;
      --teal: #00c8b4;
      --text: #e6edf3;
      --muted: rgba(255,255,255,0.45);
      --dim: rgba(255,255,255,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      color: var(--text);
    }

    /* Background */
    .bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 20%, rgba(120,80,255,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 60% at 85% 80%, rgba(0,200,180,0.08) 0%, transparent 70%);
    }

    .noise {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* Layout */
    .container {
      position: relative; z-index: 1;
      max-width: 740px; margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 0 0 1px rgba(120,80,255,0.1), 0 20px 60px rgba(0,0,0,0.5);
      margin-bottom: 24px;
    }

    /* Profile */
    .profile-row {
      display: flex; align-items: flex-start; gap: 24px; margin-bottom: 28px;
    }

    .avatar-wrap { position: relative; flex-shrink: 0; }

    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--teal));
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 700; color: #fff;
      overflow: hidden;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .avatar-ring {
      position: absolute; inset: -3px; border-radius: 50%;
      border: 2px solid transparent;
      background: linear-gradient(135deg, var(--accent), var(--teal)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out; mask-composite: exclude;
      animation: spin 8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .profile-info { flex: 1; padding-top: 4px; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--teal);
      background: rgba(0,200,180,0.1); border: 1px solid rgba(0,200,180,0.2);
      border-radius: 20px; padding: 3px 10px; margin-bottom: 10px;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--teal);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

    .name {
      font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
      line-height: 1.1; margin-bottom: 4px;
    }
    .name span {
      background: linear-gradient(90deg, var(--accent), var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .title-text { font-size: 14px; color: var(--muted); margin-bottom: 4px; }
    .location { font-size: 13px; color: var(--dim); }

    .bio {
      font-size: 14px; line-height: 1.7; color: var(--muted);
      border-top: 1px solid var(--border); padding-top: 20px; margin-bottom: 24px;
    }

    /* Social */
    .social-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .social-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: 13px; text-decoration: none;
      transition: all 0.2s; cursor: pointer; position: relative;
    }
    .social-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(120,80,255,0.1); }

    .social-icon { font-size: 16px; }

    /* WeChat popup */
    .wechat-popup {
      display: none; position: absolute; bottom: calc(100% + 10px); left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e; border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; text-align: center;
      white-space: nowrap; z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .wechat-popup::after {
      content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      border: 6px solid transparent; border-top-color: var(--border);
    }
    .social-btn:hover .wechat-popup { display: block; }
    .wechat-popup p { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .wechat-qr {
      width: 120px; height: 120px; background: white; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #666; margin: 0 auto;
    }

    /* Contact row */
    .contact-row {
      display: flex; gap: 16px; flex-wrap: wrap;
      padding-top: 20px; border-top: 1px solid var(--border); margin-top: 20px;
    }
    .contact-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted); text-decoration: none;
    }
    .contact-item:hover { color: var(--text); }

    /* Section */
    .section-title {
      font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--dim); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Posts */
    .post-item {
      padding: 20px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s;
    }
    .post-item:last-child { border-bottom: none; padding-bottom: 0; }
    .post-item:hover .post-title { color: var(--accent); }

    .post-meta {
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
    }
    .post-tag {
      font-size: 11px; padding: 2px 8px; border-radius: 5px;
      background: rgba(120,80,255,0.12); border: 1px solid rgba(120,80,255,0.25);
      color: var(--accent);
    }
    .post-date { font-size: 12px; color: var(--dim); }

    .post-title {
      font-size: 16px; font-weight: 600; margin-bottom: 6px;
      color: var(--text); transition: color 0.2s;
    }
    .post-summary { font-size: 13px; color: var(--muted); line-height: 1.6; }

    .post-arrow {
      float: right; color: var(--dim); font-size: 18px; margin-top: -2px;
      transition: transform 0.2s, color 0.2s;
    }
    .post-item:hover .post-arrow { transform: translateX(4px); color: var(--accent); }

    /* Edit hint */
    .edit-hint {
      text-align: center; padding: 16px;
      font-size: 12px; color: var(--dim);
    }
    .edit-hint a { color: var(--accent); text-decoration: none; }
    .edit-hint a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 24px; }
      .profile-row { flex-direction: column; align-items: center; text-align: center; }
      .social-row { justify-content: center; }
      .contact-row { justify-content: center; }
      .name { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="noise"></div>

  <div class="container">

    <!-- Profile Card -->
    <div class="card">
      <div class="profile-row">
        <div class="avatar-wrap">
          <div class="avatar" id="avatar-el">AC</div>
          <div class="avatar-ring"></div>
        </div>
        <div class="profile-info">
          <div class="status-badge">
            <div class="status-dot"></div>
            <span id="status-text">开放合作</span>
          </div>
          <div class="name" id="name-el">Alex <span>Chen</span></div>
          <div class="title-text" id="title-el">创意导演 & 数字艺术家</div>
          <div class="location" id="location-el">📍 上海 · Studio Nebula</div>
        </div>
      </div>

      <div class="bio" id="bio-el">
        专注于品牌视觉、动态设计与创意策划。用设计讲故事，用创意连接世界。热爱咖啡、旅行和一切有趣的事物。
      </div>

      <!-- Social -->
      <div class="section-title">社交媒体</div>
      <div class="social-row" id="social-row">
        <!-- Rendered by JS -->
      </div>

      <!-- Contact -->
      <div class="contact-row">
        <a class="contact-item" id="email-el" href="#">
          <span>✉️</span><span id="email-text"></span>
        </a>
      </div>
    </div>

    <!-- Blog Posts -->
    <div class="card">
      <div class="section-title">最新文章</div>
      <div id="posts-container"></div>
    </div>

    <div class="edit-hint">
      想修改内容？编辑仓库中的
      <a href="https://github.com/123ebison-tech/card/edit/main/config.json" target="_blank">config.json</a>
      即可自动更新 ✨
    </div>

  </div>

  <script>
    // Load config and render
    fetch('config.json?v=' + Date.now())
      .then(r => r.json())
      .then(config => render(config))
      .catch(() => {
        // Use embedded fallback
        render(window.__fallback__);
      });

    window.__fallback__ = {
      "profile": {
        "name": "Alex Chen",
        "title": "创意导演 & 数字艺术家",
        "bio": "专注于品牌视觉、动态设计与创意策划。用设计讲故事，用创意连接世界。",
        "avatar": "avatar.jpg",
        "location": "上海 · Studio Nebula",
        "email": "alex@studionebula.design",
        "available": true
      },
      "social": [
        { "name": "微信公众号", "icon": "wechat", "url": "#wechat", "qrcode": "", "color": "#07C160" }
      ],
      "posts": []
    };

    function render(config) {
      const p = config.profile;

      // Avatar
      const avatarEl = document.getElementById('avatar-el');
      if (p.avatar) {
        const img = document.createElement('img');
        img.src = p.avatar;
        img.onerror = () => { avatarEl.textContent = p.name.slice(0,2).toUpperCase(); };
        avatarEl.innerHTML = '';
        avatarEl.appendChild(img);
      } else {
        avatarEl.textContent = p.name.slice(0,2).toUpperCase();
      }

      // Status
      document.getElementById('status-text').textContent = p.available ? '开放合作' : '暂不接单';

      // Name — split at space for gradient
      const nameParts = p.name.split(' ');
      if (nameParts.length >= 2) {
        document.getElementById('name-el').innerHTML =
          nameParts[0] + ' <span>' + nameParts.slice(1).join(' ') + '</span>';
      } else {
        document.getElementById('name-el').innerHTML = '<span>' + p.name + '</span>';
      }

      document.getElementById('title-el').textContent = p.title;
      document.getElementById('location-el').textContent = '📍 ' + p.location;
      document.getElementById('bio-el').textContent = p.bio;

      // Email
      if (p.email) {
        document.getElementById('email-el').href = 'mailto:' + p.email;
        document.getElementById('email-text').textContent = p.email;
      }

      // Social
      const socialRow = document.getElementById('social-row');
      const icons = { wechat: '💬', weibo: '🔴', douyin: '🎵', kuaishou: '⚡', xiaohongshu: '📕', linkedin: '💼', github: '🐙', twitter: '🐦', youtube: '▶️', bilibili: '📺' };

      (config.social || []).forEach(s => {
        const btn = document.createElement('div');
        btn.className = 'social-btn';

        if (s.icon === 'wechat') {
          btn.innerHTML = '<span class="social-icon">💬</span>' + s.name +
            '<div class="wechat-popup">' +
              '<div class="wechat-qr">' +
                (s.qrcode ? '<img src="' + s.qrcode + '" style="width:100%;height:100%;object-fit:contain;border-radius:6px"/>'
                          : '请在 config.json 中<br>设置 qrcode 路径') +
              '</div>' +
              '<p>扫码关注公众号</p>' +
            '</div>';
        } else {
          btn.innerHTML = '<span class="social-icon">' + (icons[s.icon] || '🔗') + '</span>' + s.name;
          btn.onclick = () => { if (s.url && s.url !== '#') window.open(s.url, '_blank'); };
          btn.style.cursor = 'pointer';
        }

        socialRow.appendChild(btn);
      });

      // Posts
      const postsContainer = document.getElementById('posts-container');
      if (!config.posts || config.posts.length === 0) {
        postsContainer.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:24px;font-size:14px">暂无文章，在 config.json 中添加吧</div>';
        return;
      }

      config.posts.forEach(post => {
        const item = document.createElement('div');
        item.className = 'post-item';
        item.onclick = () => { if (post.url && post.url !== '#') window.open(post.url, '_blank'); };
        item.innerHTML = `
          <div class="post-meta">
            <span class="post-tag">${post.tag || '文章'}</span>
            <span class="post-date">${post.date}</span>
          </div>
          <div class="post-title">
            <span class="post-arrow">→</span>
            ${post.title}
          </div>
          <div class="post-summary">${post.summary}</div>
        `;
        postsContainer.appendChild(item);
      });
    }
  </script>
</body>
</html>
